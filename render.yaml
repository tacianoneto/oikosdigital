services:
  - type: web
    name: oikos-server
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm run start -w @oikos/server
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DB_PATH
        value: /tmp/oikos.db
      - key: TURN_TIMEOUT_MS
        value: "90000"
      - key: ROOM_MAX_AGE_MS
        value: "86400000"
      - key: CLIENT_ORIGIN
        sync: false
